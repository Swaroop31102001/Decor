<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ activity.title }} - S.L. Partylines</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #db2777;
            --accent: #7c3aed;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            scroll-behavior: smooth;
        }

        .playfair {
            font-family: 'Playfair Display', serif;
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .hero-gradient {
            background: linear-gradient(135deg, rgba(238, 242, 255, 1) 0%, rgba(24df, 248, 255, 1) 100%);
        }
        
        .floating-wa {
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 flex flex-col min-h-screen">

    <!-- Navigation -->
    <nav class="glass-nav fixed top-0 w-full z-50 py-4">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
            <a href="{{ url_for('home') }}" class="flex items-center gap-2">
                <span class="text-2xl">🎉</span>
                <span class="text-xl font-extrabold tracking-tight text-indigo-900">S.L. <span class="text-pink-600">Partylines</span></span>
            </a>
            <div class="hidden md:flex items-center gap-8">
                <a href="{{ url_for('home') }}" class="font-semibold text-slate-600 hover:text-indigo-600 transition-colors flex items-center gap-2">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Offerings
                </a>
                <a href="https://wa.me/919845855646" target="_blank" class="bg-indigo-600 text-white px-6 py-2.5 rounded-full font-bold hover:bg-indigo-700 shadow-lg shadow-indigo-200 transition-all">Enquire Now</a>
            </div>
            <!-- Mobile Menu Button -->
            <a href="{{ url_for('home') }}" class="md:hidden p-2 text-indigo-600 font-bold flex items-center gap-1">
                <i data-lucide="arrow-left" class="w-5 h-5"></i> Back 
            </a>
        </div>
    </nav>

    <!-- Activity Detail Section -->
    <main class="flex-grow pt-32 pb-24 px-4 bg-slate-50">
        <div class="max-w-5xl mx-auto">
            <!-- Breadcrumb -->
            <div class="mb-8 flex items-center gap-2 text-sm font-semibold text-slate-500">
                <a href="{{ url_for('home') }}" class="hover:text-indigo-600 transition-colors">Home</a>
                <i data-lucide="chevron-right" class="w-4 h-4 text-slate-400"></i>
                <a href="{{ url_for('home') }}#activities" class="hover:text-indigo-600 transition-colors">Activities</a>
                <i data-lucide="chevron-right" class="w-4 h-4 text-slate-400"></i>
                <span class="text-indigo-600">{{ activity.title }}</span>
            </div>

            <div class="bg-white rounded-[3rem] shadow-xl overflow-hidden border border-slate-100 flex flex-col md:flex-row">
                <!-- Image Side -->
                <div class="w-full md:w-1/2 h-[400px] md:h-auto relative">
                    <img src="{{ url_for('static', filename='images/' + activity.image) }}" alt="{{ activity.title }}" class="absolute inset-0 w-full h-full object-cover">
                </div>
                
                <!-- Content Side -->
                <div class="w-full md:w-1/2 p-10 md:p-16 flex flex-col justify-center">
                    <div class="inline-flex items-center gap-2 bg-indigo-50 text-indigo-700 px-4 py-1.5 rounded-full font-bold text-sm uppercase tracking-wider mb-6 w-max">
                        <i data-lucide="star" class="w-4 h-4"></i> Premium Activity
                    </div>
                    <h1 class="playfair text-4xl md:text-5xl font-extrabold text-slate-900 mb-6 leading-tight">{{ activity.title }}</h1>
                    <p class="text-lg text-slate-600 leading-relaxed mb-10">{{ activity.description }}</p>
                    
                    <div class="flex flex-col sm:flex-row gap-4">
                        <a href="https://wa.me/919845855646?text=Hi!%20I'm%20interested%20in%20booking%20the%20{{ activity.title }}%20activity%20for%20an%20upcoming%20event." target="_blank"
                            class="flex items-center justify-center gap-2 bg-[#25D366] text-white px-8 py-4 rounded-2xl font-bold text-lg hover:bg-green-600 hover:shadow-lg hover:shadow-green-200 transition-all text-center">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="none">
                                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z" />
                            </svg>
                            Book on WhatsApp
                        </a>
                        <a href="{{ url_for('home') }}#contact" class="px-8 py-4 bg-white border-2 border-indigo-100 text-indigo-700 rounded-2xl font-bold text-lg hover:bg-indigo-50 hover:border-indigo-300 transition-all text-center">
                            Contact Us
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-12 bg-white border-t border-slate-200 text-center mt-auto">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex flex-col items-center gap-6">
                <div class="flex items-center gap-2">
                    <span class="text-2xl">🎉</span>
                    <span class="text-xl font-extrabold text-indigo-900">S.L. <span class="text-pink-600">Partylines</span></span>
                </div>
                <p class="text-slate-500 font-medium">© 2026 S.L. Partylines Event Decorators | Designed for Joy</p>
            </div>
        </div>
    </footer>

    <!-- Floating WhatsApp -->
    <a href="https://wa.me/919845855646" class="floating-wa fixed bottom-8 right-8 bg-[#25D366] text-white p-4 rounded-full shadow-2xl z-[100] hover:scale-110 transition-transform">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="currentColor" stroke="none">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z" />
        </svg>
    </a>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
