<!DOCTYPE html>
<html>
<head>
    <title>Gallery | S.L.Partylines</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .gallery-grid {
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
}

.gallery-grid img {
    width: 100%;
    height: 260px;
    object-fit: cover;
    border-radius: 12px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.12);
    transition: transform 0.3s ease;
    cursor: pointer;
}

.gallery-grid img:hover {
    transform: scale(1.05);
}

    </style>
</head>

<body>

    <nav class="navbar logo-nav">
    <div class="logo">🎉 S.L.Partylines</div>

                <a href="{{ url_for('snacks') }}">🍿 Snacks</a>
                <a href="{{ url_for('flower_decor') }}">🌸 Flowers</a>
            </div>
        </div>

        <a href="{{ url_for('gallery') }}">🖼 Gallery</a>
        <a href="{{ url_for('contact') }}">📞 Contact</a>
    </div>
</nav>

<section class="home-section">

<img src="{{ url_for('static', filename='images/Grand theme decor 2.jpeg') }}" alt="Grand Theme Decoration">

</footer>

<script>
function toggleDropdown() {
    document.querySelector(".dropdown-content")

}
</script>
